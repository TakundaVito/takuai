<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Takunda Vito — Portfolio Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    #chat-widget {
      width: 400px;
      max-width: 100%;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #chat-header {
      background: #1a1a1a;
      color: #fff;
      padding: 16px 20px;
      font-size: 15px;
      font-weight: 500;
    }

    #chat-header span {
      display: block;
      font-size: 12px;
      color: #aaa;
      margin-top: 2px;
      font-weight: 400;
    }

    #messages {
      flex: 1;
      height: 380px;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.5;
    }

    .bubble.user {
      background: #1a1a1a;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .bubble.assistant {
      background: #f0f0f0;
      color: #1a1a1a;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .bubble.thinking {
      background: #f0f0f0;
      color: #999;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      font-style: italic;
    }

    #input-row {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid #eee;
    }

    #user-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    #user-input:focus { border-color: #1a1a1a; }

    #send-btn {
      padding: 10px 18px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #send-btn:hover { background: #333; }
    #send-btn:disabled { background: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>
  <div id="chat-widget">
    <div id="chat-header">
      Ask me anything
      <span>Takunda Vito · Mechatronics &amp; AI Engineer</span>
    </div>
    <div id="messages">
      <div class="bubble assistant">Hi! I'm here to help you learn about Takunda's work in mechatronics, AI, and embedded systems. What would you like to know?</div>
    </div>
    <div id="input-row">
      <input id="user-input" type="text" placeholder="Ask me anything…" />
      <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>
  <script src="chat.js"></script>
</body>
</html>
